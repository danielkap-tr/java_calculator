server:
  port: 8080

spring:
  application:
    name: calculator-service
  
  datasource:
    url: jdbc:h2:mem:calculator;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Security logging
logging:
  level:
    org.springframework.security: DEBUG
    org.jooq: DEBUG
